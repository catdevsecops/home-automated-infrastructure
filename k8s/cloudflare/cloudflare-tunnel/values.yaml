cloudflare-tunnel:
  cloudflare:
    tunnelName: skynet.intranet
    secretName: cloudflare-tunnel-secret
    enableWarp: false
  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"
  nodeSelector:
    "node-role.kubernetes.io/control-plane": ""
