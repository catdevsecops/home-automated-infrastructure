apiVersion: v1
kind: PersistentVolume
metadata:
  name: traefik-pv
spec:
  storageClassName: local-storage
  capacity:
    storage: 256Mi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  local:
    path: /var/mnt/traefik
  nodeAffinity:
      required:
        nodeSelectorTerms:
        - matchExpressions:
          - key: node-role.kubernetes.io/control-plane
            operator: DoesNotExist

