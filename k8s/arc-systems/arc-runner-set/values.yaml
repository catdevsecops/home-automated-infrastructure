gha-runner-scale-set:
  ## URL do repositório ou organização
  githubConfigUrl: "https://github.com/catdevsecops/home-automated-infrastructure"

  ## Nome da Secret gerada pelo seu ExternalSecret
  githubConfigSecret: "github-app-secret"

  ## Configuração do Runner
  minRunners: 1
  maxRunners: 3

  ## Configuração do Controller
  controllerServiceAccount:
    name: arc-systems-arc-operator-gha-rs-controller
    namespace: arc-systems

  ## Nome do Runner Group no GitHub (opcional)
  runnerScaleSetName: "k8s-runner-set"
  ## template to build
  template:
    spec:
      initContainers:
        - name: init-dind-externals
          image: ghcr.io/actions/actions-runner:latest
          command:
            ["cp", "-r", "/home/runner/externals/.", "/home/runner/tmpDir/"]
          volumeMounts:
            - name: dind-externals
              mountPath: /home/runner/tmpDir
        - name: init-dind-rootless
          image: docker:dind-rootless
          command:
            - sh
            - -c
            - |
              set -x
              cp -a /etc/. /dind-etc/
              echo 'runner:x:1001:1001:runner:/home/runner:/bin/ash' >> /dind-etc/passwd
              echo 'runner:x:1001:' >> /dind-etc/group
              echo 'runner:100000:65536' >> /dind-etc/subgid
              echo 'runner:100000:65536' >> /dind-etc/subuid
              chmod 755 /dind-etc;
              chmod u=rwx,g=rx+s,o=rx /dind-home
              chown 1001:1001 /dind-home
          securityContext:
            runAsUser: 0
          volumeMounts:
            - mountPath: /dind-etc
              name: dind-etc
            - mountPath: /dind-home
              name: dind-home
        - name: dind
          image: docker:dind-rootless
          args:
            - dockerd
            - --host=unix:///run/user/1001/docker.sock
            - --mtu=1300
          securityContext:
            privileged: true
            runAsUser: 1001
            runAsGroup: 1001
          restartPolicy: Always
          startupProbe:
            exec:
              command:
                - docker
                - info
            initialDelaySeconds: 0
            failureThreshold: 24
            periodSeconds: 5
          volumeMounts:
            - name: work
              mountPath: /home/runner/_work
            - name: dind-sock
              mountPath: /run/user/1001
            - name: dind-externals
              mountPath: /home/runner/externals
            - name: dind-etc
              mountPath: /etc
            - name: dind-home
              mountPath: /home/runner
      containers:
        - name: runner
          image: ghcr.io/actions/actions-runner:latest
          command: ["/home/runner/run.sh"]
          env:
            - name: DOCKER_HOST
              value: unix:///run/user/1001/docker.sock
          securityContext:
            privileged: true
            runAsUser: 1001
            runAsGroup: 1001
          volumeMounts:
            - name: work
              mountPath: /home/runner/_work
            - name: dind-sock
              mountPath: /run/user/1001
      volumes:
        - name: work
          emptyDir: {}
        - name: dind-externals
          emptyDir: {}
        - name: dind-sock
          emptyDir: {}
        - name: dind-etc
          emptyDir: {}
        - name: dind-home
          emptyDir: {}
