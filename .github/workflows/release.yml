name: Release Base Image

on:
  release:
    types: [published]

jobs:
  generate_release_artifacts:
    permissions:
      id-token: write
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.14.8"
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: us-east-2
          role-to-assume: ${AWS_ROLE_ARN}
          role-session-name: MySessionName
      - name: Get Output
        run: |
          # Deploy using your preferred method
          cd terraform/bootstrap/cloud
          curl -o base-image.arm.${{ github.event.release.tag_name }}.xz  $(terraform output -raw disk_image_url)
      - name: Upload Asset
        uses: softprops/action-gh-release@v3
        with:
          files: base-image.arm.${{ github.event.release.tag_name }}.xz
